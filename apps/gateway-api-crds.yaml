# GATEWAY API CRDs: foundational Kubernetes API extensions for modern routing.
# These Custom Resource Definitions (CRDs) are required BEFORE installing Ingress Controllers (like Traefik) 
# or creating Routes (HTTPRoute, Gateway, etc.).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    # SYNC WAVE -2: This is a foundation layer. 
    # It must be installed EARLIER than the Database Operator (-1) and the Application (1).
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    # Official Kubernetes SIGs repository for Gateway API.
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.5.1
    # Path to the standard (stable) CRDs.
    path: config/crd/standard
  
  destination:
    server: https://kubernetes.default.svc
    # CRDs are cluster-scoped, so namespace is usually empty or ignored.
    namespace: ""
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # SERVER-SIDE APPLY: Mandatory for CRDs as they often exceed the 256KB annotation limit.
      - ServerSideApply=true
