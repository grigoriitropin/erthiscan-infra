apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: erthiscan-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/grigoriitropin/erthiscan-infra.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: erthiscan
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
