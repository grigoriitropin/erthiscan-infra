# KUSTOMIZATION: The orchestration layer for the Erthiscan application stack.
# It bundles all individual manifests into a single deployable unit.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# RESOURCES: List of all manifests to be included in the build.
# Note: Backup schedule is currently commented out in the source.
# - 08-postgres-scheduled-backup.yaml
resources:
- 00-erthiscan-namespace.yaml
- 01-postgres-cluster.yaml
- 02-migration-job.yaml
- 03-erthiscan-core.yaml
- 04-service.yaml
- 04a-backend-tls-policy.yaml
- 05-gateway.yaml
- 06-httproute.yaml
- 07-open-facts-import-cronjob.yaml
- 08-pod-monitor.yaml
- 09-redis.yaml
- 10-kafka.yaml
- 11-worker.yaml

# IMAGES: Centralized image management.
# This ensures that all components (API, Worker, Migration Job) 
# use the exact same version of the application code.
    # TAG: Points to a specific Git commit for reproducible deployments.
images:
- name: ghcr.io/grigoriitropin/erthiscan-core
  newName: ghcr.io/grigoriitropin/erthiscan-core
  newTag: 0e1b35d1c9cc869b4b16bd2c38adb0547a65aa8a
