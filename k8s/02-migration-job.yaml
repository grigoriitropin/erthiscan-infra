# DATABASE MIGRATIONS: This Job runs Alembic to update the PostgreSQL schema.
# It runs during the ArgoCD sync process to ensure the DB is ready before the app starts.
apiVersion: batch/v1
kind: Job
metadata:
  name: erthiscan-core-migrate
  namespace: erthiscan
  annotations:
    # SYNC WAVE 1: Aligned with the application deployment.
    argocd.argoproj.io/sync-wave: "1"
    
    # ARGO HOOKS: This job is part of the synchronization process.
    argocd.argoproj.io/hook: Sync
    
    # DELETE POLICY: "BeforeHookCreation" ensures that any previous (failed or finished) 
    # migration jobs are deleted before a new one is started.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # FAILSAFE: If the job doesn't finish in 5 minutes, kill it to avoid blocking the sync.
  activeDeadlineSeconds: 300
  # RETRY: Try up to 3 times before considering the migration failed.
  backoffLimit: 3
  
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
          
      containers:
        - name: migrate
          # Uses the same image as the core application.
          image: ghcr.io/grigoriitropin/erthiscan-core
          # COMMAND: Runs Alembic to apply all pending migrations to the latest version.
          command: ["alembic", "upgrade", "head"]
          
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
              
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              
          env:
            # CREDENTIALS: Automatically pulled from the secret generated by CloudNativePG.
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: dbname
            
            # CONNECTION STRING: Uses the internal service name of the PostgreSQL cluster.
            - name: DB_WRITE_URL
              value: "postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@postgres-cluster-rw.erthiscan.svc.cluster.local:5432/$(DB_NAME)"
