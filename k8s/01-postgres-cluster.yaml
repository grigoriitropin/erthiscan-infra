apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: erthiscan

spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  storage:
    storageClass: longhorn-single-replica
    size: 15Gi

  postgresql:
    parameters:
      wal_compression: "zstd"
      max_wal_size: "2GB"

  resources:
    requests:
      memory: "1800Mi"
      cpu: "500m"
    limits:
      memory: "1800Mi"
      cpu: "1500m"

