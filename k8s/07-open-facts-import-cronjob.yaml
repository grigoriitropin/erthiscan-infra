apiVersion: batch/v1
kind: CronJob
metadata:
  name: erthiscan-open-facts-import
  namespace: erthiscan
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          nodeSelector:
            workload: heavy
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: import-open-facts
              image: ghcr.io/grigoriitropin/erthiscan-core
              command: ["python", "-m", "app.collector.open_facts_dump"]
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 1500m
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-cluster-app
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-cluster-app
                      key: password
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: postgres-cluster-app
                      key: dbname
                - name: DB_WRITE_URL
                  value: "postgresql+psycopg://$(DB_USER):$(DB_PASSWORD)@postgres-cluster-rw.erthiscan.svc.cluster.local:5432/$(DB_NAME)"
