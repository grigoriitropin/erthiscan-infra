apiVersion: apps/v1
kind: Deployment
metadata:
  name: erthiscan-core
  namespace: erthiscan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erthiscan-core
  template:
    metadata:
      labels:
        app: erthiscan-core
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: erthiscan-core
          image: ghcr.io/grigoriitropin/erthiscan-core
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /db-health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster-app
                  key: dbname
            - name: DB_WRITE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@postgres-cluster-rw.erthiscan.svc.cluster.local:5432/$(DB_NAME)"
            - name: DB_READ_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@postgres-cluster-rw.erthiscan.svc.cluster.local:5432/$(DB_NAME)"
            - name: GOOGLE_WEB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: erthiscan-auth
                  key: google-web-client-id
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: erthiscan-auth
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://redis.erthiscan.svc.cluster.local:6379/0"
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: erthiscan-core-tls
