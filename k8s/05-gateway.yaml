apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: erthiscan-gateway
  namespace: erthiscan
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: websecure
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: cloudflare-origin-cert
      allowedRoutes:
        namespaces:
          from: Same
